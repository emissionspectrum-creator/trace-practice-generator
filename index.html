<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>描紅練字頁產生器</title>
  <meta
    name="description"
    content="逐字輸入，立即產生 A4 描紅練字頁，並可直接下載 PDF。"
  >

  <!-- 字體 -->
  <link rel="preconnect" href="https://fonts.googleapis.comf="https://fonts.gstatic.com" crossorigins.com/css2?family=Comfortaa:wght@400;500;700&family=Huninn&display=swap"
    rel="stylesheet"
  href="./style.css"app-shell">
    <aside class="control-panel">
      <header class="panel-header">
        <h1>描紅練字頁產生器</h1>
        <p>逐字輸入，立即產生 A4 練字頁，並可直接下載 PDF。</p>
      </header>

      <section class="control-group" aria-label="輸入與控制">
        <div class="control-row control-row-inline">
          <label class="sr-only" for="charInput">輸入一個字元</label>
          <input
            id="charInput"
            class="text-input"
            type="text"
            inputmode="text"
            autocomplete="off"
            spellcheck="false"
            placeholder="輸入 1 個字元"
          >
          <button id="addCharBtn" class="btn btn-primary" type="button">輸入</button>
        </div>

        <p class="helper-text">
          每次加入 1 個字元；若貼入多個字元，只會取第一個，不會自動拆字。
        </p>

        <div class="control-row">
          <button id="clearBtn" class="btn btn-danger" type="button">全部清除</button>
        </div>

        <div class="control-row">
          <button id="exportPdfBtn" class="btn btn-accent" type="button">輸出 PDF</button>
        </div>

        <div class="control-row control-row-stack">
          <label class="field-label" for="bigSizeInput">大格子的大小</label>
          <div class="size-input-wrap">
            <input
              id="bigSizeInput"
              class="number-input"
              type="number"
              min="0.5"
              max="5"
              step="0.05"
              inputmode="decimal"
            >
            <span class="unit-label">cm</span>
          </div>
        </div>
      </section>

      <section class="status-card" aria-label="版面資訊">
        <div class="status-item">
          <span class="status-label">目前字元數</span>
          <strong id="charCount">0</strong>
        </div>
        <div class="status-item">
          <span class="status-label">每列可見模組</span>
          <strong id="modulesPerRow">0</strong>
        </div>
        <div class="status-item">
          <span class="status-label">可見列數</span>
          <strong id="visibleRows">0</strong>
        </div>
      </section>
    </aside>

    <main class="preview-panel">
      <div class="preview-toolbar">
        <div class="toolbar-chip">A4 直式預覽</div>
        <div class="toolbar-chip">
          <span class="chip-label">螢幕尺規</span>
          <span class="screen-ruler" aria-hidden="true"></span>
          <span class="chip-value">1 cm</span>
        </div>
        <div class="toolbar-chip" id="previewScaleText">預覽縮放 100%</div>
      </div>

      <div id="previewViewport" class="preview-viewport">
        <div id="paperWrapper" class="paper-wrapper">
          <div id="paper" class="paper" aria-label="A4 練字頁預覽">
            <div id="sheetContent" class="sheet-content is-empty"></div>
          </div>
        </div>
      </div>
    </main>
  </div>

  <div id="toast" class="toast" role="status" aria-live="polite"></div>

  <!-- 函式庫 -->
 <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.jsript src="./script.js"></script>

  <!-- 主程式 -->
  <script src="./script.js"></script>
</body>
</html>
``
